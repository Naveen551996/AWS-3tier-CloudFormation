AWSTemplateFormatVersion: '2010-09-09'
Description: Create a VPC with EC2 instance, public and private subnets, route tables, and NAT Gateway.

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 Key Pair

  DBUsername:
    Type: String
    Default: admin

  DBPassword:
    Type: String
    NoEcho: true
    Description: Database Password

Resources:
  sampleVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 102.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: sampleVPC
    DeletionPolicy: Retain

  sampleInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: sampleInternetGateway
    DeletionPolicy: Retain

  sampleVPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref sampleVPC
      InternetGatewayId: !Ref sampleInternetGateway
    DeletionPolicy: Retain

  samplePublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref sampleVPC
      CidrBlock: 102.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [ 0, !GetAZs 'us-east-1' ]
      Tags:
        - Key: Name
          Value: samplePublicSubnet1
    DeletionPolicy: Retain

  samplePublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref sampleVPC
      CidrBlock: 102.0.3.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [ 1, !GetAZs 'us-east-1' ]
      Tags:
        - Key: Name
          Value: samplePublicSubnet2
    DeletionPolicy: Retain

  samplePublicSubnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref sampleVPC
      CidrBlock: 102.0.4.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [ 2, !GetAZs 'us-east-1' ]
      Tags:
        - Key: Name
          Value: samplePublicSubnet3
    DeletionPolicy: Retain

  samplePublicSubnet4:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref sampleVPC
      CidrBlock: 102.0.5.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [ 3, !GetAZs 'us-east-1' ]
      Tags:
        - Key: Name
          Value: samplePublicSubnet4
    DeletionPolicy: Retain

  samplePublicSubnet5:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref sampleVPC
      CidrBlock: 102.0.6.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [ 4, !GetAZs 'us-east-1' ]
      Tags:
        - Key: Name
          Value: samplePublicSubnet5
    DeletionPolicy: Retain

  samplePublicSubnet6:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref sampleVPC
      CidrBlock: 102.0.7.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [ 5, !GetAZs 'us-east-1' ]
      Tags:
        - Key: Name
          Value: samplePublicSubnet6
    DeletionPolicy: Retain

  samplePrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref sampleVPC
      CidrBlock: 102.0.2.0/24
      MapPublicIpOnLaunch: false
      AvailabilityZone: !Select [ 0, !GetAZs 'us-east-1' ]
      Tags:
        - Key: Name
          Value: samplePrivateSubnet1
    DeletionPolicy: Retain

  samplePrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref sampleVPC
      CidrBlock: 102.0.8.0/24
      MapPublicIpOnLaunch: false
      AvailabilityZone: !Select [ 1, !GetAZs 'us-east-1' ]
      Tags:
        - Key: Name
          Value: samplePrivateSubnet2
    DeletionPolicy: Retain

  samplePrivateSubnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref sampleVPC
      CidrBlock: 102.0.9.0/24
      MapPublicIpOnLaunch: false
      AvailabilityZone: !Select [ 2, !GetAZs 'us-east-1' ]
      Tags:
        - Key: Name
          Value: samplePrivateSubnet3
    DeletionPolicy: Retain

  samplePrivateSubnet4:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref sampleVPC
      CidrBlock: 102.0.10.0/24
      MapPublicIpOnLaunch: false
      AvailabilityZone: !Select [ 3, !GetAZs 'us-east-1' ]
      Tags:
        - Key: Name
          Value: samplePrivateSubnet4
    DeletionPolicy: Retain

  samplePrivateSubnet5:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref sampleVPC
      CidrBlock: 102.0.11.0/24
      MapPublicIpOnLaunch: false
      AvailabilityZone: !Select [ 4, !GetAZs 'us-east-1' ]
      Tags:
        - Key: Name
          Value: samplePrivateSubnet5
    DeletionPolicy: Retain

  samplePrivateSubnet6:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref sampleVPC
      CidrBlock: 102.0.12.0/24
      MapPublicIpOnLaunch: false
      AvailabilityZone: !Select [ 5, !GetAZs 'us-east-1' ]
      Tags:
        - Key: Name
          Value: samplePrivateSubnet6
    DeletionPolicy: Retain

  samplePublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref sampleVPC
      Tags:
        - Key: Name
          Value: samplePublicRouteTable
    DeletionPolicy: Retain

  samplePublicRoute:
    Type: AWS::EC2::Route
    DependsOn: sampleVPCGatewayAttachment
    Properties:
      RouteTableId: !Ref samplePublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref sampleInternetGateway
    DeletionPolicy: Retain

  samplePublicSubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref samplePublicSubnet1
      RouteTableId: !Ref samplePublicRouteTable
    DeletionPolicy: Retain

  samplePublicSubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref samplePublicSubnet2
      RouteTableId: !Ref samplePublicRouteTable
    DeletionPolicy: Retain

  samplePublicSubnetRouteTableAssociation3:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref samplePublicSubnet3
      RouteTableId: !Ref samplePublicRouteTable
    DeletionPolicy: Retain

  samplePublicSubnetRouteTableAssociation4:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref samplePublicSubnet4
      RouteTableId: !Ref samplePublicRouteTable
    DeletionPolicy: Retain

  samplePublicSubnetRouteTableAssociation5:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref samplePublicSubnet5
      RouteTableId: !Ref samplePublicRouteTable
    DeletionPolicy: Retain

  samplePublicSubnetRouteTableAssociation6:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref samplePublicSubnet6
      RouteTableId: !Ref samplePublicRouteTable
    DeletionPolicy: Retain

  sampleNATGatewayEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
    DeletionPolicy: Retain

  sampleNATGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      SubnetId: !Ref samplePublicSubnet1
      AllocationId: !GetAtt sampleNATGatewayEIP.AllocationId
      Tags:
        - Key: Name
          Value: sampleNATGateway
    DeletionPolicy: Retain

  samplePrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref sampleVPC
      Tags:
        - Key: Name
          Value: samplePrivateRouteTable
    DeletionPolicy: Retain

  samplePrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref samplePrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref sampleNATGateway
    DeletionPolicy: Retain

  samplePrivateSubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref samplePrivateSubnet1
      RouteTableId: !Ref samplePrivateRouteTable
    DeletionPolicy: Retain

  samplePrivateSubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref samplePrivateSubnet2
      RouteTableId: !Ref samplePrivateRouteTable
    DeletionPolicy: Retain

  samplePrivateSubnetRouteTableAssociation3:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref samplePrivateSubnet3
      RouteTableId: !Ref samplePrivateRouteTable
    DeletionPolicy: Retain

  samplePrivateSubnetRouteTableAssociation4:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref samplePrivateSubnet4
      RouteTableId: !Ref samplePrivateRouteTable
    DeletionPolicy: Retain

  samplePrivateSubnetRouteTableAssociation5:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref samplePrivateSubnet5
      RouteTableId: !Ref samplePrivateRouteTable
    DeletionPolicy: Retain

  samplePrivateSubnetRouteTableAssociation6:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref samplePrivateSubnet6
      RouteTableId: !Ref samplePrivateRouteTable
    DeletionPolicy: Retain

  sampleSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: EC2SecurityGroup
      GroupDescription: Allow SSH and HTTP access
      VpcId: !Ref sampleVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: sampleSecurityGroup
    DeletionPolicy: Retain

  sampleEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.medium
      KeyName: !Ref KeyName
      ImageId: ami-01816d07b1128cd2d  # Replace with an appropriate AMI ID
      SubnetId: !Ref samplePrivateSubnet1
      SecurityGroupIds:
        - !Ref sampleSecurityGroup
      Tags:
        - Key: Name
          Value: sampleEC2Instance
    DeletionPolicy: Retain

  sampleSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: EC2SecurityGroup    
      GroupDescription: Allow SSH and HTTP access
      VpcId: !Ref sampleVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: sampleSecurityGroup
    DeletionPolicy: Retain

  sampleEC2InstanceWithElasticIP:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      KeyName: !Ref KeyName
      ImageId: ami-01816d07b1128cd2d  # Replace with an appropriate AMI ID
      SubnetId: !Ref samplePublicSubnet1
      SecurityGroupIds:
        - !Ref sampleSecurityGroup
      Tags:
        - Key: Name
          Value: sampleEC2InstanceWithElasticIP
    DeletionPolicy: Retain

  ElasticIPForEC2:
    Type: AWS::EC2::EIP
    Properties:
      InstanceId: !Ref sampleEC2InstanceWithElasticIP
    DeletionPolicy: Retain

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: RDSSecurityGroup
      GroupDescription: Allow access to RDS
      VpcId: !Ref sampleVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: RDSSecurityGroup
    DeletionPolicy: Retain

  RDSSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for RDS
      SubnetIds:
        - !Ref samplePublicSubnet1
        - !Ref samplePublicSubnet2
        - !Ref samplePublicSubnet3
        - !Ref samplePublicSubnet4
        - !Ref samplePublicSubnet5
        - !Ref samplePublicSubnet6
        - !Ref samplePrivateSubnet1
        - !Ref samplePrivateSubnet2
        - !Ref samplePrivateSubnet3
        - !Ref samplePrivateSubnet4
        - !Ref samplePrivateSubnet5
        - !Ref samplePrivateSubnet6
      Tags:
        - Key: Name
          Value: RDSSubnetGroup
    DeletionPolicy: Retain

  MyRDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.t3.medium
      AllocatedStorage: 100
      Engine: MySQL
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      DBSubnetGroupName: !Ref RDSSubnetGroup
      MultiAZ: false
      PubliclyAccessible: false
      Tags:
        - Key: Name
          Value: MyRDSInstance
    DeletionPolicy: Retain

  sampleECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: sampleECSCluster
    DeletionPolicy: Retain

  ECSServiceSecurityGroup1:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS service SG 1
      VpcId: !Ref sampleVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: ECSServiceSecurityGroup1
    DeletionPolicy: Retain

  ECSServiceSecurityGroup2:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS service SG 2
      VpcId: !Ref sampleVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: ECSServiceSecurityGroup2
    DeletionPolicy: Retain

  ECSServiceSecurityGroup3:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS service SG 3
      VpcId: !Ref sampleVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: ECSServiceSecurityGroup3
    DeletionPolicy: Retain

  ECSServiceSecurityGroup4:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS service SG 4
      VpcId: !Ref sampleVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: ECSServiceSecurityGroup4
    DeletionPolicy: Retain

  ECSServiceSecurityGroup5:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS service SG 5
      VpcId: !Ref sampleVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: ECSServiceSecurityGroup5
    DeletionPolicy: Retain

  ECSService1:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref sampleECSCluster
      DesiredCount: 1
      LaunchType: FARGATE
      TaskDefinition: !Ref ECSTaskDefinition1
      ServiceName: ECSService1             
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref samplePrivateSubnet1
            - !Ref samplePrivateSubnet2
            - !Ref samplePrivateSubnet3
            - !Ref samplePrivateSubnet4
            - !Ref samplePrivateSubnet5
            - !Ref samplePrivateSubnet6
          SecurityGroups:
            - !Ref ECSServiceSecurityGroup1
    DeletionPolicy: Retain

  ECSService2:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref sampleECSCluster
      DesiredCount: 1
      LaunchType: FARGATE
      TaskDefinition: !Ref ECSTaskDefinition2
      ServiceName: ECSService2             
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref samplePrivateSubnet1
            - !Ref samplePrivateSubnet2
            - !Ref samplePrivateSubnet3
            - !Ref samplePrivateSubnet4
            - !Ref samplePrivateSubnet5
            - !Ref samplePrivateSubnet6
          SecurityGroups:
            - !Ref ECSServiceSecurityGroup2
    DeletionPolicy: Retain

  ECSService3:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref sampleECSCluster
      DesiredCount: 1
      LaunchType: FARGATE
      TaskDefinition: !Ref ECSTaskDefinition3
      ServiceName: ECSService3             
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref samplePrivateSubnet1
            - !Ref samplePrivateSubnet2
            - !Ref samplePrivateSubnet3
            - !Ref samplePrivateSubnet4
            - !Ref samplePrivateSubnet5
            - !Ref samplePrivateSubnet6
          SecurityGroups:
            - !Ref ECSServiceSecurityGroup3
    DeletionPolicy: Retain

  ECSService4:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref sampleECSCluster
      DesiredCount: 1
      LaunchType: FARGATE
      TaskDefinition: !Ref ECSTaskDefinition4
      ServiceName: ECSService4             
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref samplePrivateSubnet1
            - !Ref samplePrivateSubnet2
            - !Ref samplePrivateSubnet3
            - !Ref samplePrivateSubnet4
            - !Ref samplePrivateSubnet5
            - !Ref samplePrivateSubnet6
          SecurityGroups:
            - !Ref ECSServiceSecurityGroup4
    DeletionPolicy: Retain

  ECSService5:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref sampleECSCluster
      DesiredCount: 1
      LaunchType: FARGATE
      TaskDefinition: !Ref ECSTaskDefinition5
      ServiceName: ECSService5             
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref samplePrivateSubnet1
            - !Ref samplePrivateSubnet2
            - !Ref samplePrivateSubnet3
            - !Ref samplePrivateSubnet4
            - !Ref samplePrivateSubnet5
            - !Ref samplePrivateSubnet6
          SecurityGroups:
            - !Ref ECSServiceSecurityGroup5
    DeletionPolicy: Retain

  ECSTaskDefinition1:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: ECSService1Task
      Cpu: "1024"
      Memory: "6144"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ContainerDefinitions:
        - Name: ecs-container-1
          Image: amazon/amazon-ecs-sample
          Cpu: 1024
          Memory: 6144
          Essential: true
    DeletionPolicy: Retain

  ECSTaskDefinition2:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: ECSService2Task
      Cpu: "512"
      Memory: "4096"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ContainerDefinitions:
        - Name: ecs-container-1
          Image: amazon/amazon-ecs-sample
          Cpu: 512
          Memory: 4096
          Essential: true
    DeletionPolicy: Retain

  ECSTaskDefinition3:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: ECSService3Task
      Cpu: "2048"
      Memory: "4096"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ContainerDefinitions:
        - Name: ecs-container-1
          Image: amazon/amazon-ecs-sample
          Cpu: 2048
          Memory: 4096
          Essential: true
    DeletionPolicy: Retain

  ECSTaskDefinition4:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: ECSService4Task
      Cpu: "2048"
      Memory: "4096"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ContainerDefinitions:
        - Name: ecs-container-1
          Image: amazon/amazon-ecs-sample
          Cpu: 2048
          Memory: 4096
          Essential: true
    DeletionPolicy: Retain

  ECSTaskDefinition5:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: ECSService5Task
      Cpu: "2048"
      Memory: "4096"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ContainerDefinitions:
        - Name: ecs-container-1
          Image: amazon/amazon-ecs-sample
          Cpu: 2048
          Memory: 4096
          Essential: true
    DeletionPolicy: Retain

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: ALBSecurityGroup
      GroupDescription: Allow HTTP and HTTPS traffic
      VpcId: !Ref sampleVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIpv6: ::/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIpv6: ::/0
      Tags:
        - Key: Name
          Value: ALBSecurityGroup
    DeletionPolicy: Retain

  sampleALB1:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: sampleALB1
      Scheme: internet-facing
      Subnets:
        - !Ref samplePublicSubnet1
        - !Ref samplePublicSubnet2
        - !Ref samplePublicSubnet3
        - !Ref samplePublicSubnet4
        - !Ref samplePublicSubnet5
        - !Ref samplePublicSubnet6
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Type: application
      Tags:
        - Key: Name
          Value: sampleALB1          
    DeletionPolicy: Retain

  sampleALBListener1:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref sampleALB1
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref sampleTargetGroup1
    DeletionPolicy: Retain

  sampleALB2:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: sampleALB2
      Scheme: internet-facing
      Subnets:
        - !Ref samplePublicSubnet1
        - !Ref samplePublicSubnet2
        - !Ref samplePublicSubnet3
        - !Ref samplePublicSubnet4
        - !Ref samplePublicSubnet5
        - !Ref samplePublicSubnet6
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Type: application
      Tags:
        - Key: Name
          Value: sampleALB2          
    DeletionPolicy: Retain

  sampleALBListener2:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref sampleALB2
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref sampleTargetGroup2
    DeletionPolicy: Retain

  sampleTargetGroup1:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: sampleTargetGroup1
      Port: 80
      Protocol: HTTP
      VpcId: !Ref sampleVPC
      TargetType: ip
      HealthCheckProtocol: HTTP
      HealthCheckPort: traffic-port
      HealthCheckPath: /
      Tags:
        - Key: Name
          Value: sampleTargetGroup1
    DeletionPolicy: Retain

  sampleTargetGroup2:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: sampleTargetGroup2
      Port: 80
      Protocol: HTTP
      VpcId: !Ref sampleVPC
      TargetType: ip
      HealthCheckProtocol: HTTP
      HealthCheckPort: traffic-port
      HealthCheckPath: /
      Tags:
        - Key: Name
          Value: sampleTargetGroup2
    DeletionPolicy: Retain

  sampleTargetGroup3:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: sampleTargetGroup3
      Port: 80
      Protocol: HTTP
      VpcId: !Ref sampleVPC
      TargetType: ip
      HealthCheckProtocol: HTTP
      HealthCheckPort: traffic-port
      HealthCheckPath: /
      Tags:
        - Key: Name
          Value: sampleTargetGroup3
    DeletionPolicy: Retain

  sampleTargetGroup4:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: sampleTargetGroup4
      Port: 80
      Protocol: HTTP
      VpcId: !Ref sampleVPC
      TargetType: ip
      HealthCheckProtocol: HTTP
      HealthCheckPort: traffic-port
      HealthCheckPath: /
      Tags:
        - Key: Name
          Value: sampleTargetGroup4
    DeletionPolicy: Retain
